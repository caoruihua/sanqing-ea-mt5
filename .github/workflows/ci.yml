name: ci

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install -e .[dev]

      - name: Ruff
        run: uv run python -m ruff check src tests app

      - name: Pytest
        run: uv run python -m pytest -q

      - name: Optional MT5 smoke
        if: env.RUN_MT5_SMOKE == '1'
        run: uv run python -m pytest -q -k mt5_demo_smoke
